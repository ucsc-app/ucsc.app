<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | UCSC.app</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to UCSC.app — your all-in-one student platform for UC Santa Cruz." />
    <meta name="robots" content="noindex, follow" />
    <script type="text/javascript">

        var pathSegmentsToKeep = 0;
        var validRoutes = ['/', '/news', '/menu', '/courses', '/map'];
        var l = window.location;
        var currentPath = l.pathname;

        //check if the path is valid
        var isValidRoute = validRoutes.some(function(route) {
            return currentPath === route ||
                   currentPath === route + '/' ||
                   currentPath + '/' === route;
        });

        if (isValidRoute) {
            //only redirect if valid
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        } else {
            //redirect invalid paths back to home
            window.location.href = '/';
        }
    </script>
</head>

<body>
</body>

</html>
